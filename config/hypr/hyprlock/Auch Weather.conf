# Lock theme: the default "auch" layout + a weather widget in the top-right.
# Selectable from the lock-screen picker (Super+Shift+L). Built by sourcing the
# untouched auch.conf and the hidden weather snippet — so editing auch.conf or
# the widget updates this theme automatically.
source = $HOME/.config/hypr/hyprlock/auch.conf
source = $HOME/.config/hypr/hyprlock/.weather-widget.conf
