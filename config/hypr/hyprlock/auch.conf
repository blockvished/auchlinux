general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = $HOME/.cache/current_wallpaper_image
    color = rgb(15, 15, 15)
    blur_size = 5
    blur_passes = 3
    noise = 0.0117
    contrast = 1.1000
    brightness = 0.6000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>"
    color = rgba(255, 255, 255, 0.9)
    font_size = 40 
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, -60
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# Hour-Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 110
    font_family = JetBrainsMono Nerd Font ExtraBold 
    position = 0, -200
    halign = center
    valign = top
    shadow_passes = 2
    shadow_size = 4
}

# USER
label {
    monitor =
    text =   $USER
    color = rgba(255, 255, 255, 0.8)
    font_size = 28
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, 240
    halign = center
    valign = bottom
    shadow_passes = 1
}

# INPUT FIELD
input-field {
    monitor =
    size = 280, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.2)
    inner_color = rgba(0, 0, 0, 0.4)
    capslock_color = rgba(255, 100, 100, 0.8)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Propo
    placeholder_text = <i><span foreground="##ffffff99">🔒 Password...</span></i>
    hide_input = false
    position = 0, 120
    halign = center
    valign = bottom
    shadow_passes = 2
}

# Keyboard LAYOUT
label {
    monitor =
    text = $LAYOUT
    color = rgba(255, 255, 255, 0.6)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, 70
    halign = center
    valign = bottom
}

# uptime
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p)" </b>"
    color = rgba(255, 255, 255, 0.7)
    font_size = 16
    font_family = JetBrainsMono Nerd Font Propo
    position = -30, 20
    halign = right
    valign = bottom
    shadow_passes = 1
}
