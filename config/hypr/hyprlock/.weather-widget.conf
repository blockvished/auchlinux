# Weather widget for Hyprlock — kept in its own file (NOT inside any theme like
# auch.conf). change-lockscreen.sh appends a `source =` line for this onto the
# active hyprlock.conf after copying a theme, so weather shows on every theme
# without editing the theme files themselves.
label {
    monitor =
    text = cmd[update:900000] $HOME/.config/waybar/scripts/weather.sh label
    color = rgba(255, 255, 255, 0.85)
    font_size = 22
    font_family = JetBrainsMono Nerd Font Propo
    position = -40, -40
    halign = right
    valign = top
    shadow_passes = 1
    shadow_size = 3
}
