# ── Native variable definitions (converted from HyDE/wallbash) ──
# Fonts: define to the theme's intended face; hyprlock falls back to a default
# if it isn't installed, so the theme still works.
$fontFamily = Anurati
$font_family = Anurati

# Image paths → live wallpaper cache (valid image, never errors)
$BACKGROUND_PATH = $HOME/.cache/current_wallpaper_image
$PROFILE_IMAGE = $HOME/.cache/current_wallpaper_image
$MPRIS_IMAGE = $HOME/.cache/current_wallpaper_image

# wallbash palette → native (accent #a6bbda + white neutrals)
$wallbash_pry1_rgba = rgba(166,187,218,1.0)
$wallbash_pry2_rgba = rgba(166,187,218,0.85)
$wallbash_pry3_rgba = rgba(166,187,218,0.70)
$wallbash_pry4_rgba = rgba(166,187,218,1.0)
$wallbash_txt1_rgba = rgba(255,255,255,0.95)
$wallbash_txt3_rgba = rgba(255,255,255,0.80)
$wallbash_txt4_rgba = rgba(255,255,255,0.70)
$wallbash_1xa8_rgba = rgba(255,255,255,0.10)
$wallbash_1xa9_rgba = rgba(255,255,255,0.12)
$wallbash_2xa6_rgba = rgba(255,255,255,0.08)
$wallbash_2xa7_rgba = rgba(255,255,255,0.10)
$wallbash_2xa8_rgba = rgba(255,255,255,0.12)
$wallbash_2xa9_rgba = rgba(255,255,255,0.15)
$wallbash_3xa9_rgba = rgba(255,255,255,0.18)
$wallbash_4xa9_rgba = rgba(255,255,255,0.22)
$color7 = rgba(255,255,255,1.0)

# cmd vars (native replacements for HyDE's battery / media / greeting / weather)
$BATTERY_ICON = bash -c 'c=$(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null); [ -n "$c" ] && echo "  $c%" || echo ""'
$GREET_TEXT = bash -c 'echo "Hello, $(whoami)"'
$MPRIS_TEXT = bash -c "playerctl metadata --format '{{title}} — {{artist}}' 2>/dev/null"
$WEATHER_CMD = bash -c "curl -s --max-time 3 'wttr.in/?format=%c%t' 2>/dev/null"

# ── Original theme below (HyDE $resolve.font lines removed) ──
#      ░▒▒▒░░░░░▓▓          ___________
#    ░░▒▒▒░░░░░▓▓        //___________/
#   ░░▒▒▒░░░░░▓▓     _   _ _    _ _____
#   ░░▒▒░░░░░▓▓▓▓▓▓ | | | | |  | |  __/
#    ░▒▒░░░░▓▓   ▓▓ | |_| | |_/ /| |___
#     ░▒▒░░▓▓   ▓▓   \__  |____/ |____/
#       ░▒▓▓   ▓▓  //____/

$fontFamily = JetBrainsMono Nerd Font # We already have this font installed

# Resolving custom fonts
# Provide the font name and the download link separated by a pipe |
# Run font.sh resolve $LAYOUT_PATH to install the font

background {
    monitor =
    color = $wallbash_pry1_rgba
    path = $BACKGROUND_PATH
    blur_size = 4
    blur_passes = 3 # 0 disables blurring
    noise = 0.0117
    contrast = 1.3000 # Vibrant!!!
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# DAY
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A" | sed 's/./& /g' | tr '[:lower:]' '[:upper:]')" # Add a thin space between each character
    color = $wallbash_1xa9_rgba
    font_size = 110 # Wednesday is too long
    font_family = Anurati
    position = 0, 100
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%B %d")"
    color = $wallbash_2xa9_rgba
    font_size = 35
    font_family = $font_family Thin
    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    monitor =
   text = cmd[update:1000] echo "$(date +"%-I:%M %p")"
    #text = $TIME
    color = $wallbash_txt1_rgba
    font_size = 20 #!
    font_family = $font_family
    position = 0, 150
    halign = center
    valign = bottom
}
# INPUT FIELD
input-field {
    monitor =
    size = 200, 50 #!
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = $wallbash_pry4_rgba
    inner_color = $wallbash_pry2_rgba
    font_color = $wallbash_3xa9_rgba
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = $wallbash_pry4_rgba
    fail_color = rgba(FF0000FF) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = true # see below
    position = 0, 80
    halign = center
    valign = bottom
}

#User tag
label {
    monitor =
    text =   $USER
    color = $wallbash_4xa9_rgba
    font_size = 20
    font_family = Inter Display Medium
    position = 0, 30
    halign = center
    valign = bottom
}


# Battery Status if present
label {
    monitor =
    text = cmd[update:5000] $BATTERY_ICON
    color = $wallbash_4xa9_rgba
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = -1%, 1%
    halign = right
    valign = bottom
}

# Current Keyboard Layout 
label {
    monitor =
    text = $LAYOUT
    color = $wallbash_4xa9_rgba
    font_size = 20
    font_family = Inter Display Medium
    position = -2%, 1%
    halign = right
    valign = bottom
}
