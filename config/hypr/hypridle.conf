general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

# ── Dim monitor backlight (3min) ───────────────────────────────
# Skipped if media is actively playing
listener {
    timeout = 180
    on-timeout = playerctl status 2>/dev/null | grep -q Playing || brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# ── Turn off keyboard backlight (3min) ────────────────────────
listener {
    timeout = 180
    on-timeout = playerctl status 2>/dev/null | grep -q Playing || brightnessctl -sd rgb:kbd_backlight set 0
    on-resume = brightnessctl -rd rgb:kbd_backlight
}

# ── Lock screen (5min) ────────────────────────────────────────
# Media inhibition: won't lock if something is playing
listener {
    timeout = 300
    on-timeout = playerctl status 2>/dev/null | grep -q Playing || loginctl lock-session
}

# ── Turn off screen / DPMS (8min) ────────────────────────────
# Media inhibition: won't sleep if something is playing
listener {
    timeout = 480
    on-timeout = playerctl status 2>/dev/null | grep -q Playing || hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}

# ── Suspend PC (30min — disabled by default) ──────────────────
# Uncomment to enable automatic suspend after 30 minutes idle
